<div data-wpui="dropdown" class="wpui-dropdown">

    <button data-trigger class="wpui-dropdown__trigger" aria-haspopup="true" aria-expanded="false">
        Options
        <span class="wpui-dropdown__arrow" aria-hidden="true"></span>
    </button>

    <ul class="wpui-dropdown__menu" data-menu role="menu" aria-hidden="true">

        <li role="none">
            <button class="wpui-dropdown__item" role="menuitem">Edit</button>
        </li>

        <!-- Item dengan submenu -->
        <li role="none" class="wpui-dropdown__item-wrap--has-sub">
            <button class="wpui-dropdown__item wpui-dropdown__item--has-sub" role="menuitem"
                aria-haspopup="true" aria-expanded="false">
                Share
                <span class="wpui-dropdown__sub-arrow" aria-hidden="true"></span>
            </button>
            <ul class="wpui-dropdown__submenu" role="menu" aria-hidden="true">
                <li role="none">
                    <button class="wpui-dropdown__item" role="menuitem">Copy link</button>
                </li>
                <li role="none">
                    <button class="wpui-dropdown__item" role="menuitem">Email</button>
                </li>
                <li role="none">
                    <button class="wpui-dropdown__item" role="menuitem">SMS</button>
                </li>
            </ul>
        </li>

        <li role="none">
            <button class="wpui-dropdown__item" role="menuitem">Duplicate</button>
        </li>

        <li class="wpui-dropdown__divider" role="separator"></li>

        <li role="none">
            <button class="wpui-dropdown__item wpui-dropdown__item--danger" role="menuitem">Delete</button>
        </li>

    </ul>

</div>
