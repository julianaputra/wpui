<div data-wpui="accordion" class="wpui-accordion">

    <div class="wpui-accordion__item">
        <button class="wpui-accordion__trigger" data-trigger aria-expanded="false">
            Apa itu WPUI?
            <span class="wpui-accordion__icon" aria-hidden="true"></span>
        </button>
        <div class="wpui-accordion__panel" data-panel aria-hidden="true">
            <div class="wpui-accordion__body">
                <p>WPUI adalah kumpulan UI component untuk WordPress theme. Copy-paste, tanpa framework, tanpa jQuery.</p>
            </div>
        </div>
    </div>

    <div class="wpui-accordion__item">
        <button class="wpui-accordion__trigger" data-trigger aria-expanded="false">
            Apakah perlu install?
            <span class="wpui-accordion__icon" aria-hidden="true"></span>
        </button>
        <div class="wpui-accordion__panel" data-panel aria-hidden="true">
            <div class="wpui-accordion__body">
                <p>Tidak. Cukup copy file HTML, CSS, dan JS ke project kamu. Tidak ada npm, tidak ada build step.</p>
            </div>
        </div>
    </div>

    <div class="wpui-accordion__item">
        <button class="wpui-accordion__trigger" data-trigger aria-expanded="false">
            Apakah accessible?
            <span class="wpui-accordion__icon" aria-hidden="true"></span>
        </button>
        <div class="wpui-accordion__panel" data-panel aria-hidden="true">
            <div class="wpui-accordion__body">
                <p>Ya. Setiap component menggunakan ARIA attributes yang benar dan mendukung keyboard navigation.</p>
            </div>
        </div>
    </div>

</div>
