<div data-wpui="modal" id="modal-example" class="wpui-modal">

    <button data-open class="wpui-btn">
        Open Modal
    </button>

    <div class="wpui-modal__backdrop" data-backdrop>

        <div class="wpui-modal__panel" data-panel role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-title">

            <button data-close class="wpui-modal__close" aria-label="Close modal">
                &times;
            </button>

            <h2 id="modal-title">WPUI Modal</h2>

            <p>This modal supports focus trap and ESC close.</p>

            <button>Focusable button</button>

        </div>

    </div>

</div>
